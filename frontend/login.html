<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NIET Assignment Tracker - Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }

    body {
      height: 100vh;
      background: linear-gradient(rgba(0, 10, 40, 0.8), rgba(0, 10, 40, 0.9)), url("https://images.unsplash.com/photo-1523050854058-8df90110c9f1?q=80&w=2070&auto=format&fit=crop");
      background-size: cover;
      background-position: center;
      overflow: hidden;
    }

    .container {
      width: 100%;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .login-box {
      width: 100%;
      max-width: 430px;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.2);
      backdrop-filter: blur(15px);
      border-radius: 25px;
      padding: 45px;
      box-shadow: 0 0 30px rgba(0, 183, 255, 0.3);
      animation: fadeIn 1s ease;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .logo {
      text-align: center;
      margin-bottom: 25px;
    }

    .logo h1 {
      color: #00d9ff;
      font-size: 38px;
      font-weight: 700;
      letter-spacing: 2px;
    }

    .logo p {
      color: #dbeafe;
      margin-top: 5px;
      font-size: 14px;
    }

    .role-selector {
      display: flex;
      gap: 10px;
      margin-bottom: 30px;
    }

    .role-btn {
      flex: 1;
      padding: 12px;
      background: rgba(255, 255, 255, 0.1);
      border: 2px solid rgba(255, 255, 255, 0.2);
      color: white;
      cursor: pointer;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      transition: all 0.3s;
    }

    .role-btn:hover {
      background: rgba(255, 255, 255, 0.15);
      border-color: rgba(255, 255, 255, 0.4);
    }

    .role-btn.active {
      background: linear-gradient(to right, #00c6ff, #0072ff);
      border-color: #00d9ff;
      box-shadow: 0 0 15px rgba(0, 217, 255, 0.5);
    }

    .input-box {
      position: relative;
      margin-bottom: 25px;
    }

    .input-box input {
      width: 100%;
      padding: 15px 50px 15px 18px;
      border: none;
      outline: none;
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.12);
      color: white;
      font-size: 15px;
      transition: 0.3s;
    }

    .input-box input:focus {
      border: 1px solid #00d9ff;
      box-shadow: 0 0 15px rgba(0, 217, 255, 0.4);
    }

    .input-box input::placeholder {
      color: #d1d5db;
    }

    .input-box i {
      position: absolute;
      right: 18px;
      top: 17px;
      color: #00d9ff;
      font-size: 18px;
      cursor: pointer;
      transition: 0.3s;
    }

    .input-box i:hover {
      color: #00f0ff;
      transform: scale(1.1);
    }

    .error-msg {
      color: #ff6b6b;
      text-align: center;
      margin-bottom: 15px;
      font-size: 13px;
      background: rgba(255, 107, 107, 0.1);
      padding: 10px;
      border-radius: 8px;
      display: none;
    }

    .error-msg.show {
      display: block;
    }

    .btn {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 12px;
      background: linear-gradient(to right, #00c6ff, #0072ff);
      color: white;
      font-size: 17px;
      font-weight: 600;
      cursor: pointer;
      transition: 0.4s;
    }

    .btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 0 20px rgba(0, 183, 255, 0.5);
    }

    .register-link {
      text-align: center;
      margin-top: 25px;
      color: white;
      font-size: 14px;
    }

    .register-link a {
      color: #00d9ff;
      text-decoration: none;
      font-weight: 500;
    }

    .register-link a:hover {
      text-decoration: underline;
    }

    @media(max-width:500px) {
      .login-box {
        padding: 35px 25px;
      }

      .logo h1 {
        font-size: 30px;
      }

      .role-btn {
        font-size: 12px;
        padding: 10px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="login-box">
      <div class="logo">
        <h1>NIET</h1>
        <p>Assignment Submission Tracker</p>
      </div>

      <div class="role-selector">
        <button type="button" class="role-btn active" data-role="student">
          <i class="fas fa-graduation-cap"></i> Student
        </button>
        <button type="button" class="role-btn" data-role="admin">
          <i class="fas fa-user-tie"></i> Admin
        </button>
      </div>

      <div id="errorMsg" class="error-msg"></div>

      <form id="loginForm">
        <div class="input-box">
          <input type="email" id="loginEmail" placeholder="Enter your email" required>
          <i class="fa-solid fa-envelope"></i>
        </div>

        <div class="input-box">
          <input type="password" id="loginPassword" placeholder="Enter your password" required>
          <i class="fa-solid fa-eye-slash" id="togglePassword" onclick="togglePasswordVisibility()" style="cursor: pointer;"></i>
        </div>

        <button type="submit" class="btn">Login Now</button>
      </form>

      <div class="register-link">
        Don't have an account? <a href="register.html">Register as Student</a>
      </div>
    </div>
  </div>

  <script>
    // API URL configuration (automatically toggles between local server and deployed URL)
    const API_URL = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1' || window.location.hostname.startsWith('192.168.')
      ? `http://${window.location.hostname}:5000/api`
      : 'https://nietassigment.onrender.com/api'; // Replace with your actual Render backend URL
    let selectedRole = 'student';

    // Toggle Password Visibility
    function togglePasswordVisibility() {
      const passwordField = document.getElementById('loginPassword');
      const toggleIcon = document.getElementById('togglePassword');
      
      if (passwordField.type === 'password') {
        passwordField.type = 'text';
        toggleIcon.classList.remove('fa-eye-slash');
        toggleIcon.classList.add('fa-eye');
      } else {
        passwordField.type = 'password';
        toggleIcon.classList.remove('fa-eye');
        toggleIcon.classList.add('fa-eye-slash');
      }
    }

    // Role selection
    document.querySelectorAll('.role-btn').forEach(btn => {
      btn.addEventListener('click', function() {
        document.querySelectorAll('.role-btn').forEach(b => b.classList.remove('active'));
        this.classList.add('active');
        selectedRole = this.dataset.role;
      });
    });

    // Login form
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();

      const email = document.getElementById('loginEmail').value.trim();
      const password = document.getElementById('loginPassword').value;
      const errorMsg = document.getElementById('errorMsg');

      // Clear previous error
      errorMsg.classList.remove('show');
      errorMsg.textContent = '';

      if (!email || !password) {
        errorMsg.textContent = 'Email and password are required';
        errorMsg.classList.add('show');
        return;
      }

      try {
        const response = await fetch(`${API_URL}/auth/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });

        const data = await response.json();

        if (!response.ok) {
          errorMsg.textContent = data.message || 'Login failed';
          errorMsg.classList.add('show');
          return;
        }

        // Check if role matches the selected tab
        if (data.user.role !== selectedRole) {
          errorMsg.textContent = `❌ This account is registered as ${data.user.role}. Please select the "${data.user.role}" tab to login.`;
          errorMsg.classList.add('show');
          
          // Auto-switch to correct role
          setTimeout(() => {
            document.querySelectorAll('.role-btn').forEach(b => b.classList.remove('active'));
            document.querySelector(`[data-role="${data.user.role}"]`).classList.add('active');
            selectedRole = data.user.role;
          }, 2000);
          return;
        }

        // Save token and user
        localStorage.removeItem('token');
        localStorage.removeItem('user');
        localStorage.setItem('token', data.token);
        localStorage.setItem('user', JSON.stringify(data.user));

        // Show success message
        errorMsg.style.background = 'rgba(76, 175, 80, 0.1)';
        errorMsg.style.color = '#4CAF50';
        errorMsg.textContent = '✅ Login successful! Redirecting...';
        errorMsg.classList.add('show');

        // Redirect based on role
        setTimeout(() => {
          if (data.user.role === 'admin') {
            window.location.href = 'admin-dashboard.html';
          } else {
            window.location.href = 'dashboard.html';
          }
        }, 1000);
      } catch (error) {
        console.error('Login error:', error);
        errorMsg.textContent = '⚠️ Network error. Please check your connection and try again.';
        errorMsg.classList.add('show');
      }
    });
  </script>
</body>
</html>
