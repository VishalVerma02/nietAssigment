<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NIET Assignment Tracker - Register</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            height: 100vh;
            background:
                linear-gradient(rgba(0, 10, 40, 0.8),
                    rgba(0, 10, 40, 0.9)),
                url("https://images.unsplash.com/photo-1523050854058-8df90110c9f1?q=80&w=2070&auto=format&fit=crop");
            background-size: cover;
            background-position: center;
            overflow: hidden;
        }

        .container {
            width: 100%;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .register-box {
            width: 100%;
            max-width: 460px;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(15px);
            border-radius: 25px;
            padding: 40px;
            box-shadow: 0 0 30px rgba(0, 183, 255, 0.3);
            animation: fadeIn 1s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .logo {
            text-align: center;
            margin-bottom: 20px;
        }

        .logo h1 {
            color: #00d9ff;
            font-size: 38px;
            font-weight: 700;
            letter-spacing: 2px;
        }

        .logo p {
            color: #dbeafe;
            margin-top: 5px;
            font-size: 14px;
        }

        .register-box h2 {
            text-align: center;
            color: white;
            margin-bottom: 30px;
            font-size: 28px;
        }

        .input-box {
            position: relative;
            margin-bottom: 22px;
        }

        .input-box input {
            width: 100%;
            padding: 15px 50px 15px 18px;
            border: none;
            outline: none;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.12);
            color: white;
            font-size: 15px;
            transition: 0.3s;
        }

        .input-box input:focus {
            border: 1px solid #00d9ff;
            box-shadow: 0 0 15px rgba(0, 217, 255, 0.4);
        }

        .error-text {
            color: #ff4d6d;
            font-size: 12px;
            margin-top: -15px;
            margin-bottom: 15px;
            display: none;
            text-align: left;
            padding-left: 5px;
            font-weight: 500;
        }

        .input-box input::placeholder {
            color: #d1d5db;
        }

        .input-box i {
            position: absolute;
            right: 18px;
            top: 17px;
            color: #00d9ff;
            font-size: 18px;
        }

        .terms {
            color: white;
            font-size: 14px;
            margin-bottom: 25px;
        }

        .terms a {
            color: #00d9ff;
            text-decoration: none;
        }

        .terms a:hover {
            text-decoration: underline;
        }

        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 12px;
            background: linear-gradient(to right, #00c6ff, #0072ff);
            color: white;
            font-size: 17px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.4s;
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 0 20px rgba(0, 183, 255, 0.5);
        }

        .login-link {
            text-align: center;
            margin-top: 25px;
            color: white;
            font-size: 14px;
        }

        .login-link a {
            color: #00d9ff;
            text-decoration: none;
            font-weight: 500;
        }

        .login-link a:hover {
            text-decoration: underline;
        }

        .back-home-btn {
            position: absolute;
            top: 30px;
            left: 30px;
            display: flex;
            align-items: center;
            gap: 8px;
            color: #00d9ff;
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 10px 18px;
            border-radius: 12px;
            backdrop-filter: blur(10px);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            transition: all 0.3s ease;
            z-index: 10;
        }

        .back-home-btn:hover {
            background: rgba(0, 217, 255, 0.15);
            border-color: rgba(0, 217, 255, 0.3);
            color: white;
            transform: translateX(-4px);
            box-shadow: 0 4px 20px rgba(0, 217, 255, 0.3);
        }

        .bottom-text {
            text-align: center;
            color: #cbd5e1;
            margin-top: 20px;
            font-size: 12px;
        }

        @media(max-width:500px) {
            .back-home-btn {
                top: 15px;
                left: 15px;
                padding: 8px 14px;
                font-size: 12px;
            }

            .register-box {
                padding: 30px 22px;
            }

            .logo h1 {
                font-size: 30px;
            }

            .register-box h2 {
                font-size: 24px;
            }
        }
    </style>
</head>

<body>
    <a href="index.html" class="back-home-btn">
        <i class="fa-solid fa-arrow-left"></i> Back to Home
    </a>
    <div class="container">

        <div class="register-box">

            <div class="logo">
                <h1>NIET</h1>
                <p>Assignment Submission Tracker</p>
            </div>

            <h2>Create Account</h2>

            <form id="registerForm">

                <div class="input-box">
                    <input type="text" id="fullName"
                        placeholder="Enter your full name" required>
                    <i class="fa-solid fa-user"></i>
                </div>

                <div class="input-box">
                    <input type="email" id="email"
                        placeholder="Enter your email" required>
                    <i class="fa-solid fa-envelope"></i>
                </div>
                <div id="emailError" class="error-text">Please enter a valid email address (e.g. name@domain.com).</div>

                <div class="input-box">
                    <input type="password" id="password"
                        placeholder="Create password" required>
                    <i class="fa-solid fa-lock"></i>
                </div>

                <div class="input-box">
                    <input type="password" id="confirmPassword"
                        placeholder="Confirm password" required>
                    <i class="fa-solid fa-lock"></i>
                </div>

                <button type="submit" class="btn">
                    Create Account
                </button>

            </form>

            <div class="login-link">
                Already have an account?
                <a href="login.html">Login</a>
            </div>

            <div class="bottom-text">
                © 2025 NIET Greater Noida
            </div>

        </div>

    </div>

    <script src="api.js"></script>
</body>

</html>
